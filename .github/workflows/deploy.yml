name: Build & Deploy to EC2

# 트리거:
# - develop 브랜치에 push되면 자동 (app/ai_worker 변경 시)
# - workflow_dispatch: GitHub UI에서 수동 실행 가능
on:
  push:
    branches: [develop]
    paths:
      - "app/**"
      - "ai_worker/**"
      - "frontend/**"
      - "infra/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_to_ec2:
        description: "빌드 후 EC2에 자동 배포 (EC2가 실행 중이어야)"
        type: boolean
        default: true

env:
  DOCKERHUB_REPO: ckd-care
  APP_VERSION: v1.0.0
  AI_WORKER_VERSION: v1.0.0

jobs:
  # ===== 1) Docker 이미지 빌드 + Hub 푸시 =====
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      app_tag: ${{ steps.tags.outputs.app_tag }}
      ai_tag: ${{ steps.tags.outputs.ai_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          APP_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:app-${{ env.APP_VERSION }}"
          AI_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:ai-${{ env.AI_WORKER_VERSION }}"
          echo "app_tag=$APP_TAG" >> $GITHUB_OUTPUT
          echo "ai_tag=$AI_TAG"   >> $GITHUB_OUTPUT

      - name: Build & push FastAPI (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./app/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.app_tag }}
          cache-from: type=gha,scope=fastapi
          cache-to: type=gha,scope=fastapi,mode=max

      - name: Build & push AI Worker (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ai_worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.ai_tag }}
          cache-from: type=gha,scope=ai-worker
          cache-to: type=gha,scope=ai-worker,mode=max

  # ===== 2) EC2 자동 배포 (이미지 pull + 컨테이너 재시작) =====
  # EC2가 실행 중일 때만 동작. stop 상태면 SSH 실패 → 빌드 단계는 성공으로 남고 이 job만 fail.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # workflow_dispatch 입력의 deploy_to_ec2가 false면 스킵
    if: ${{ github.event_name == 'push' || inputs.deploy_to_ec2 == true }}
    steps:
      # 2-0) 코드 checkout — scp-action이 source 파일 찾으려면 runner에 코드 필요.
      # 누락 시 "tar: empty archive" 에러 (build-and-deploy-frontend는 checkout 있어서 OK)
      - name: Checkout
        uses: actions/checkout@v4

      # 2-1) docker-compose.yml SCP (단일 파일 — scp-action multi-line/comma 버그 회피)
      - name: Sync docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/docker/docker-compose.prod.yml"
          target: "/tmp/ci-sync"

      # 2-2) nginx 설정 SCP (별도 step)
      - name: Sync nginx config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/nginx/prod.conf"
          target: "/tmp/ci-sync"

      # 2-2) EC2 안에서 파일 정위치로 이동 + 컨테이너 재시작
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # 명령어 흐름:
          # 1) SCP된 설정 파일 정위치 이동 (compose·nginx)
          # 2) 최신 이미지 pull
          # 3) fastapi + ai-worker up -d (compose 변경 시 자동 재생성, 변경 없으면 no-op)
          # 4) nginx restart — 설정 갱신 + upstream DNS 캐시 갱신
          # 5) DB 마이그레이션 (idempotent)
          # 6) 사용 안 하는 이미지 정리
          script: |
            set -e
            cd ~/ai_project
            echo "=== sync config files ==="
            cp /tmp/ci-sync/infra/docker/docker-compose.prod.yml ./docker-compose.yml
            cp /tmp/ci-sync/infra/nginx/prod.conf ./nginx/default.conf
            rm -rf /tmp/ci-sync
            echo "=== docker compose pull ==="
            docker compose pull fastapi ai-worker
            echo "=== up -d --no-deps fastapi + ai-worker (compose 변경 시 자동 재생성) ==="
            docker compose up -d --no-deps fastapi ai-worker
            echo "=== nginx restart (설정 갱신 + DNS 캐시 갱신) ==="
            docker compose restart nginx
            echo "=== run aerich upgrade (idempotent) ==="
            docker compose exec -T fastapi uv run aerich upgrade || echo "no migrations to apply"
            echo "=== cleanup dangling images ==="
            docker image prune -f
            echo "=== final state ==="
            docker compose ps

  # ===== 3) React 프론트엔드 빌드 + EC2 SCP =====
  # frontend/ckd-care-app/dist 를 nginx 정적 서빙 경로(~/ai_project/frontend_dist)에 동기화.
  # nginx restart 불필요 (정적 파일은 즉시 반영).
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.deploy_to_ec2 == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/ckd-care-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/ckd-care-app
        run: npm ci

      - name: Build (vite production)
        working-directory: frontend/ckd-care-app
        run: npm run build

      - name: Upload dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/ckd-care-app/dist/*"
          target: "/home/ubuntu/ai_project/frontend_dist"
          strip_components: 3
