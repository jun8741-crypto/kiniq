name: ci.yml

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'
  pull_request:
    # feature 브랜치는 보통 develop으로 PR을 생성하기 때문에 develop이 target 브랜치에 포함되어 있다면 별도로 적지 않아도 됩니다.
    branches:
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff Check (Linting)
        run: uv run ruff check .

      - name: Run Ruff Format Check
        run: uv run ruff format . --check

      - name: Check migration number collisions
        # 병렬 브랜치가 같은 마이그 번호(N)를 생성해 머지 시 충돌하는 것을 PR 단계에서 차단.
        # 기존 25·26은 grandfather. 해결=최신 develop rebase 후 aerich migrate 재생성.
        run: bash scripts/check_migration_numbers.sh

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ckduser
          POSTGRES_PASSWORD: ckdpass1234
          POSTGRES_DB: ckd_challenge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group app --frozen

      - name: Create ckduser maintenance + test databases
        # asyncpg가 DB DROP/CREATE 시 maintenance DB로 username(ckduser)을 기본 사용.
        # ckduser DB가 없으면 "database ckduser does not exist" 에러 발생 → 미리 생성.
        # ckd_challenge_test는 conftest 폴백이 만들지만 CI에서도 명시 (로컬과 패턴 통일).
        env:
          PGPASSWORD: ckdpass1234
        run: |
          psql -h localhost -U ckduser -d ckd_challenge \
            -c "CREATE DATABASE ckduser OWNER ckduser;"
          psql -h localhost -U ckduser -d ckd_challenge \
            -c "CREATE DATABASE ckd_challenge_test OWNER ckduser;"

      - name: Check if tests exist
        id: check_tests
        # tests 폴더나 test_*.py 파일이 있는지 확인
        run: |
          if [ -d "tests" ] || [ $(find . -name "test_*.py" | wc -l) -gt 0 ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Tests with Coverage
        if: steps.check_tests.outputs.has_tests == 'true'
        run: |
          uv run coverage run -m pytest app
          uv run coverage report -m
