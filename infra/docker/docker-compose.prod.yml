# 운영 환경 Docker Compose (EC2 배포용)
# SCP로 EC2 /home/ubuntu/ai_project/docker-compose.yml 에 복사해 사용
#
# 변경사항 (강의 자료 대비):
# - DB: MySQL → PostgreSQL (앱 코드와 정합)
# - Qdrant 추가 (RAG 벡터 DB)
# - ai-worker 모델 볼륨 마운트
# - nginx에 React 빌드 결과 볼륨 마운트 (옵션 A)
# - certbot 일단 제외 (HTTPS는 9단계에서 별도 추가)

services:
  # 1. Redis (메시지 브로커 및 캐싱)
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - ws
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 2. PostgreSQL (운영: 포트 미노출, 내부 ws 네트워크로만 접근)
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: 'Asia/Seoul'
    networks:
      - ws
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 3. Qdrant (RAG 벡터 DB — 운영: 포트 미노출)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    networks:
      - ws
    volumes:
      - qdrant_data:/qdrant/storage

  # 4. FastAPI (API 서버)
  fastapi:
    container_name: fastapi
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file: .env
    environment:
      # docker 내부 서비스명으로 override
      REDIS_HOST: redis
      DB_HOST: postgres
      QDRANT_HOST: qdrant
    restart: always
    ports:
      - "8000:8000"   # EC2 보안 그룹에서 80/443만 허용해 외부 직접 접근 차단됨
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. AI Worker (ML 모델 추론 + RAG)
  ai-worker:
    container_name: ai-worker
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file: .env
    environment:
      REDIS_HOST: redis
      DB_HOST: postgres
      QDRANT_HOST: qdrant
      QDRANT_URL: http://qdrant:6333
    volumes:
      # 모델 파일은 Docker 이미지에 안 넣고 EC2에 SCP로 올린 후 read-only 마운트
      # EC2 경로: /home/ubuntu/ai_project/models/ckd
      - ./models/ckd:/app/models/ckd:ro
      # RAG indexing용 의료 문서 (~79MB, .dockerignore로 이미지 미포함) — EC2에 SCP로 올린 후 ro 마운트
      # EC2 경로: /home/ubuntu/ai_project/rag_data (Qdrant indexing 시점에만 필요, 검색은 qdrant_data 볼륨 사용)
      - ./rag_data:/app/src/rag_indexing/data:ro
    restart: always
    mem_limit: 4G
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  # 6. Nginx (리버스 프록시 + React 정적 서빙)
  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      # SCP로 EC2에 올린 prod.conf 를 default.conf 자리로 마운트
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # SCP로 올린 React 빌드 결과 (frontend/ckd-care-app/dist)
      - ./frontend_dist:/vol/web/frontend:ro
      # HTTPS — Let's Encrypt 인증서 (certbot 컨테이너와 공유)
      - certbot-conf:/etc/letsencrypt:ro
      # ACME challenge 경로 (certbot이 발급/갱신 시 사용)
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"   # HTTPS
    networks:
      - ws
    depends_on:
      - fastapi
    restart: always

  # 7. Certbot — Let's Encrypt SSL 인증서 자동 갱신 (48h 주기)
  # 최초 발급은 EC2에서 일회성 컨테이너로 수동 실행 (docs 참고)
  # 이후 이 컨테이너가 인증서 만료 30일 전부터 자동 갱신
  certbot:
    image: certbot/certbot
    container_name: auto-certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 48h & wait $${!}; done;'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - nginx
    restart: always

volumes:
  postgres_data:
    name: postgres_data
  qdrant_data:
    name: qdrant_data
  # HTTPS — Let's Encrypt 인증서·challenge 볼륨 (nginx ↔ certbot 공유)
  certbot-conf:
    name: certbot-conf
  certbot-www:
    name: certbot-www

networks:
  ws:
    name: ws
    driver: bridge
