# Nginx 운영 설정 (EC2 배포용)
# SCP로 EC2 /home/ubuntu/ai_project/nginx/default.conf 에 복사해 사용
# HTTPS 활성 — Let's Encrypt 인증서 (certbot 컨테이너가 자동 갱신)

upstream fastapi {
    server fastapi:8000;
}

# ===== HTTP (80) — ACME challenge + HTTPS 리다이렉트 =====
server {
    listen 80;
    server_name healthypeople.kr www.healthypeople.kr;

    # Let's Encrypt ACME challenge (인증서 발급/갱신 시 사용)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 HTTP 요청 → HTTPS 영구 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== HTTPS (443) — 본 서비스 =====
server {
    listen 443 ssl;
    http2 on;
    server_name healthypeople.kr www.healthypeople.kr;

    # SSL 인증서 (Let's Encrypt, certbot 자동 갱신)
    ssl_certificate /etc/letsencrypt/live/healthypeople.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/healthypeople.kr/privkey.pem;

    # Modern SSL 설정 (Mozilla intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — 1년 (브라우저에 "이 사이트는 항상 HTTPS" 강제)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ===== 1. API 프록시 (강의 자료 패턴) =====
    location /api/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;  # SSE/스트리밍 (RAG 챗봇)

        client_max_body_size 10M;  # OCR PDF 업로드
    }

    # ===== 2. React SPA 정적 서빙 (옵션 A) =====
    location / {
        root /vol/web/frontend;
        try_files $uri $uri/ /index.html;

        location ~* \.(?:css|js|ico|svg|png|jpg|jpeg|woff2?)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
