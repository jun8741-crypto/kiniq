services:
  # 1. Redis (메시지 브로커 및 캐싱)
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - ws
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 2. Database
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: 'Asia/Seoul'
    ports:
      - ${DB_EXPOSE_PORT}:${DB_PORT}
    networks:
      - ws
    volumes:
      - postgres_data:/var/lib/postgresql/data  # 컨테이너가 삭제돼도 데이터는 호스트 파일시스템에 남음
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql  # 컨테이너 최초 생성 시 ckduser DB 자동 생성
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 3. API Server (FastAPI)
  fastapi:
    container_name: fastapi
    build:
      context: .  # 프로젝트 루트를 빌드 컨텍스트로 지정
      dockerfile: app/Dockerfile  # Dockerfile 위치 지정
      platforms:
        - linux/amd64
        - linux/arm64
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}  # APP_VERSION은 빌드된 이미지의 버전관리를 위함입니다. v1.0.0 형식으로 사용합니다.
    env_file: .env
    command: |
      sh -c "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app  # 로컬의 app 디렉토리를 컨테이너의 /app/app에 마운트(수정사항 즉시 반영)
      - static_volume:/app/templates
    restart: always
    ports:
      - "8000:8000"
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. AI Worker (Model 학습 및 추론)
  ai-worker:
    container_name: ai-worker
    build:
      context: .  # 프로젝트 루트를 빌드 컨텍스트로 지정
      dockerfile: ai_worker/Dockerfile  # Dockerfile 위치 지정
      platforms:
        - linux/amd64
        - linux/arm64
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}  # AI_WORKER_VERSION은 빌드된 이미지의 버전관리를 위함입니다. V1.0.0 형식으로 사용합니다.
    env_file: .env
    environment:
      # docker 내부 서비스명으로 접속 (env_file의 localhost 값을 override)
      REDIS_HOST: redis
      QDRANT_URL: http://qdrant:6333
    restart: always
    mem_limit: 4G
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started   # RAG 벡터 검색 (REQ-RAG)

  # 5. Nginx (웹 서버 - 요청 리버스 프록시로 전달)
  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
    ports:
      - "80:80"
    networks:
      - ws
    depends_on:
      - fastapi

  # 6. Qdrant (RAG 벡터 DB — 의미 검색, REQ-RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"   # REST API + 웹 대시보드 (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage   # 벡터·컬렉션 영구 저장 (컨테이너 삭제돼도 유지)
    networks:
      - ws
    # Qdrant 이미지에 셸/curl이 없어 compose healthcheck는 생략.
    # ai-worker는 condition: service_started로 의존하고, 앱 레벨에서 /readyz 확인 권장.

volumes:
  postgres_data:
  static_volume:
  qdrant_data:   # Qdrant 벡터 스토리지

networks:
  ws:
    driver: bridge
