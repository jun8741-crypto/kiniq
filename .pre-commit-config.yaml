# 커밋 직전에 자동 실행되는 검사 도구.
# 설치: `uv sync` 후 `uv run pre-commit install`
# 수동 실행: `uv run pre-commit run --all-files`

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      # 1. lint 검사 + 자동 수정 (import 정렬, deprecated 문법 등)
      - id: ruff-check
        args: [--fix]
      # 2. 코드 포맷 자동 적용
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # 파일 끝 개행 보장
      - id: end-of-file-fixer
      # 줄 끝 공백 제거
      - id: trailing-whitespace
      # YAML 문법 체크
      - id: check-yaml
      # 거대 파일 커밋 방지 (>500KB)
      - id: check-added-large-files
        args: ['--maxkb=500']
      # 충돌 마커(<<<<<<<) 남은 채 커밋 방지
      - id: check-merge-conflict
